name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tooling
        run: python -m pip install --upgrade pip ruff

      - name: Compile sources
        run: python -m compileall plugins tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Lint core modules and tests
        run: ruff check plugins/monte_carlo.py plugins/sensitivity_analysis.py plugins/report_generator.py plugins/reliability_math.py tests
