name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Lint with ruff
        run: uvx ruff check --output-format=github .
      - name: Check formatting with ruff
        run: uvx ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --all-extras
        env:
          UV_PYTHON: ${{ matrix.python-version }}
      - name: Type check with ty
        run: uv run ty check plugins/ 2>&1 | tail -5
      - name: Run tests with coverage
        run: uv run pytest -v --tb=short --cov=plugins --cov-report=term-missing --cov-report=xml
      - name: Upload coverage to CI
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  test-wx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps for wxPython
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-wxgtk4.0 xvfb
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run wx-dependent tests
        run: xvfb-run uv run pytest -v --tb=short -k "wx" --cov=plugins --cov-report=term-missing || echo "No wx tests found"
      - name: Upload coverage to CI
        uses: actions/upload-artifact@v4
        with:
          name: coverage-wx
          path: coverage.xml
          if-no-files-found: warn
